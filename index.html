<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Interpretation Challenge</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f5f3ef;
      color: #222;
      font-family: Arial, Helvetica, sans-serif;
    }

    .screen {
      display: none;
      min-height: 100vh;
      padding: 40px 20px;
      align-items: center;
      justify-content: center;
    }

    .screen.active { display: flex; }

    .card {
      width: 100%;
      max-width: 820px;
      padding: 45px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 5px 25px rgba(0, 0, 0, 0.10);
    }

    h1, h2 {
      margin-top: 0;
      text-align: center;
    }

    h1 { font-size: 38px; }
    h2 { font-size: 30px; }

    p {
      font-size: 18px;
      line-height: 1.6;
    }

    .center { text-align: center; }

    .language-buttons,
    .download-buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 35px;
    }

    button {
      padding: 14px 25px;
      border: 0;
      border-radius: 9px;
      background: #34271f;
      color: #fff;
      font-size: 17px;
      cursor: pointer;
    }

    button:hover:not(:disabled) { opacity: 0.85; }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .main-button {
      display: block;
      min-width: 180px;
      margin: 30px auto 0;
    }

    .waiting-button {
      width: 100%;
      max-width: 460px;
      background: #6c625b;
    }

    .download-buttons button { min-width: 220px; }

    .upload-status {
      margin: 20px 0;
      padding: 14px 16px;
      border-radius: 10px;
      font-weight: 700;
      line-height: 1.5;
    }

    .upload-status.saving {
      background: #f3f3f3;
      color: #444;
    }

    .upload-status.success {
      background: #edf8ef;
      color: #245c2d;
    }

    .upload-status.error {
      background: #fff1f1;
      color: #8a1f1f;
    }

    .form-group { margin-bottom: 23px; }
    .conditional-group {
      display: none;
      margin-top: -8px;
      margin-bottom: 23px;
      padding: 16px;
      background: #f7f5f2;
      border-radius: 9px;
    }

    .conditional-group.visible {
      display: block;
    }


    .form-group label,
    .question-label {
      display: block;
      margin-bottom: 9px;
      font-size: 17px;
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 13px;
      border: 1px solid #bbb;
      border-radius: 8px;
      background: #fff;
      font-family: inherit;
      font-size: 17px;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
      line-height: 1.6;
    }

    .consent-box {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-top: 25px;
      padding: 18px;
      background: #f7f5f2;
      border-radius: 9px;
    }

    .consent-box input {
      width: auto;
      margin-top: 5px;
    }

    .consent-box label {
      font-size: 16px;
      line-height: 1.5;
    }

    .small-note {
      color: #555;
      font-size: 15px;
    }

    .instruction-list {
      margin: 25px 0;
      padding-left: 28px;
    }

    .instruction-list li {
      margin-bottom: 14px;
      font-size: 18px;
      line-height: 1.5;
    }

    #trial-card { max-width: 900px; }

    .trial-header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
      font-size: 17px;
      font-weight: 700;
    }

    #timer {
      min-width: 190px;
      text-align: right;
    }

    #stimulus-frame {
      width: 100%;
      height: 430px;
      margin: 5px auto 15px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #stimulus {
      display: block;
      width: auto;
      max-width: 100%;
      height: auto;
      max-height: none;
      object-fit: contain;
      transform: scale(1.35);
      transform-origin: center center;
    }

    .response-info {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      margin-top: 8px;
      color: #666;
      font-size: 14px;
    }

    .response-note {
      margin-top: 8px;
      color: #666;
      font-size: 14px;
    }

    .likert-question { margin: 35px 0; }

    .post-task-question {
      margin: 30px 0;
      padding: 20px;
      background: #f7f5f2;
      border-radius: 12px;
    }

    .post-task-question-text {
      display: block;
      margin-bottom: 14px;
      font-size: 19px;
      font-weight: 700;
      line-height: 1.4;
    }

    .post-task-reminder {
      margin: 16px 0 0;
      color: #666;
      font-size: 15px;
      text-align: center;
    }

    .likert-scale {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-top: 15px;
    }

    .likert-option { position: relative; }

    .likert-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .likert-option label {
      display: block;
      padding: 14px 5px;
      border: 1px solid #bbb;
      border-radius: 8px;
      background: #fff;
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .likert-option label:hover {
      border-color: #34271f;
    }

    .likert-option input:checked + label {
      background: #34271f;
      color: #fff;
      border-color: #34271f;
    }

    .scale-endpoints {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-top: 9px;
      color: #555;
      font-size: 14px;
    }

    .error {
      min-height: 22px;
      margin-top: 18px;
      color: #b00020;
      text-align: center;
      font-weight: 700;
    }

    .tutorial-video {
      display: block;
      width: 100%;
      max-width: 720px;
      margin: 24px auto;
      border-radius: 12px;
      background: #000;
    }

    .tutorial-note {
      margin-top: 24px;
      padding: 24px 28px;
      background: #fff7f7;
      border: 3px solid #c62828;
      border-radius: 12px;
      color: #8b0000;
      font-size: 23px;
      line-height: 1.6;
      font-weight: 700;
      text-align: center;
      box-shadow: 0 4px 16px rgba(198, 40, 40, 0.12);
    }

    .tutorial-explanation {
      margin: 20px 0 24px;
      padding: 20px;
      background: #f7f5f2;
      border-radius: 10px;
      font-size: 17px;
      line-height: 1.7;
    }

    .tutorial-explanation p {
      margin: 0 0 14px;
      font-size: 17px;
    }

    .tutorial-explanation p:last-child {
      margin-bottom: 0;
    }

    .tutorial-explanation h3 {
      margin: 0 0 14px;
      font-size: 24px;
      line-height: 1.35;
    }

    .important-red {
      margin: 18px 0 24px;
      padding: 16px 18px;
      border: 2px solid #c62828;
      border-radius: 10px;
      color: #c62828;
      background: #fff7f7;
      font-size: 18px;
      line-height: 1.6;
      font-weight: 700;
    }

    @media (max-width: 650px) {
      .card { padding: 28px 20px; }
      h1 { font-size: 30px; }
      .trial-header { flex-direction: column; }
      #timer { text-align: left; }
      .likert-scale { gap: 4px; }
      .likert-option label { padding: 12px 2px; }
    }
  </style>
</head>

<body>
  <section id="language-screen" class="screen active">
    <div class="card center">
      <h1>Choose Your Language</h1>
      <p>Dilinizi seçin · Choose your language · 언어를 선택하세요</p>

      <div class="language-buttons">
        <button type="button" onclick="selectLanguage('tr')">Türkçe</button>
        <button type="button" onclick="selectLanguage('en')">English</button>
        <button type="button" onclick="selectLanguage('ko')">한국어</button>
      </div>
    </div>
  </section>

  <section id="welcome-screen" class="screen">
    <div class="card center">
      <h1 id="welcome-title"></h1>
      <p id="welcome-text"></p>

      <button
        id="welcome-button"
        type="button"
        class="main-button"
        onclick="showScreen('consent-screen')"
      ></button>
    </div>
  </section>

  <section id="consent-screen" class="screen">
    <div class="card">
      <h2 id="consent-title"></h2>
      <p id="anonymous-note"></p>

      <div class="consent-box">
        <input id="consent-checkbox" type="checkbox">
        <label id="consent-checkbox-label" for="consent-checkbox"></label>
      </div>

      <p id="consent-error" class="error"></p>

      <button
        id="consent-button"
        type="button"
        class="main-button"
        onclick="saveConsent()"
      ></button>
    </div>
  </section>

  <section id="demographics-screen" class="screen">
    <div class="card">
      <h2 id="demographics-title"></h2>

      <div class="form-group">
        <label id="age-label" for="age"></label>
        <input id="age" type="number" min="18" max="120">
      </div>

      <div class="form-group">
        <label id="gender-label" for="gender"></label>
        <select id="gender"></select>
      </div>

      <div class="form-group">
        <label id="native-language-label" for="native-language"></label>
        <input id="native-language" type="text" autocomplete="off">
      </div>

      <div class="form-group">
        <label id="fortune-familiarity-label" for="fortune-familiarity"></label>
        <select id="fortune-familiarity"></select>
      </div>

      <div class="form-group">
        <label id="fortune-received-label" for="fortune-received"></label>
        <select id="fortune-received"></select>
      </div>

      <div id="fortune-received-count-group" class="conditional-group">
        <label id="fortune-received-count-label" for="fortune-received-count"></label>
        <select id="fortune-received-count"></select>
      </div>

      <div class="form-group">
        <label id="fortune-given-label" for="fortune-given"></label>
        <select id="fortune-given"></select>
      </div>

      <div id="fortune-given-count-group" class="conditional-group">
        <label id="fortune-given-count-label" for="fortune-given-count"></label>
        <select id="fortune-given-count"></select>
      </div>

      <p id="demographics-error" class="error"></p>

      <button
        id="demographics-button"
        type="button"
        class="main-button"
        onclick="saveParticipantInformation()"
      ></button>
    </div>
  </section>

  <section id="instructions-screen" class="screen">
    <div class="card">
      <h2 id="instructions-title"></h2>

      <ul class="instruction-list">
        <li id="instruction-one"></li>
        <li id="instruction-two"></li>
        <li id="instruction-three"></li>
        <li id="instruction-four"></li>
        <li id="instruction-five"></li>
        <li id="instruction-six"></li>
      </ul>

      <button
        id="begin-button"
        type="button"
        class="main-button"
        onclick="continueFromInstructions()"
      ></button>
    </div>
  </section>

  <section id="fortune-info-screen" class="screen">
    <div class="card">
      <h2 id="fortune-info-title"></h2>

      <div id="fortune-info-body" class="tutorial-explanation"></div>

      <div id="fortune-info-important" class="important-red"></div>

      <button
        id="fortune-info-button"
        type="button"
        class="main-button"
        onclick="showScreen('tutorial-screen')"
      ></button>
    </div>
  </section>

  <section id="tutorial-screen" class="screen">
    <div class="card">
      <h2 id="tutorial-title"></h2>

      <div id="tutorial-explanation" class="tutorial-explanation"></div>

      <div id="tutorial-important" class="important-red"></div>

      <p id="tutorial-text"></p>

      <video
        id="tutorial-video"
        class="tutorial-video"
        controls
        playsinline
        preload="metadata"
      >
        <source src="coffee.MOV">
        Your browser does not support video playback.
      </video>

      <div id="tutorial-note" class="tutorial-note"></div>

      <button
        id="understood-button"
        type="button"
        class="main-button"
        onclick="beginExperiment()"
      ></button>
    </div>
  </section>

  <section id="trial-screen" class="screen">
    <div id="trial-card" class="card">
      <div class="trial-header">
        <span id="trial-progress"></span>
        <span id="timer"></span>
      </div>

      <div id="stimulus-frame">
        <img id="stimulus" alt="Coffee-cup image">
      </div>

      <label id="response-label" class="question-label" for="response"></label>

      <textarea
        id="response"
        autocomplete="off"
        autocapitalize="sentences"
        spellcheck="true"
      ></textarea>

      <p id="response-note" class="response-note"></p>

      <div class="response-info">
        <span id="character-count"></span>
        <span id="word-count"></span>
      </div>

      <button
        id="waiting-button"
        type="button"
        class="main-button waiting-button"
        disabled
      ></button>
    </div>
  </section>

  <section id="inter-trial-screen" class="screen">
    <div class="card center">
      <h2 id="inter-trial-title"></h2>
      <p id="inter-trial-text"></p>

      <button
        id="inter-trial-button"
        type="button"
        class="main-button"
        onclick="startNextTrialFromBreak()"
      ></button>
    </div>
  </section>

  <section id="post-task-screen" class="screen">
    <div class="card">
      <h2 id="post-task-title"></h2>
      <p id="post-task-intro"></p>

      <div class="post-task-question">
        <div id="enjoyable-question" class="post-task-question-text"></div>
        <div id="post-enjoyable-scale" class="likert-scale"></div>
        <div class="scale-endpoints">
          <span id="post-left-1"></span>
          <span id="post-right-1"></span>
        </div>
      </div>

      <div class="post-task-question">
        <div id="easy-patterns-question" class="post-task-question-text"></div>
        <div id="post-easy-patterns-scale" class="likert-scale"></div>
        <div class="scale-endpoints">
          <span id="post-left-2"></span>
          <span id="post-right-2"></span>
        </div>
      </div>

      <div class="post-task-question">
        <div id="effortful-question" class="post-task-question-text"></div>
        <div id="post-effortful-scale" class="likert-scale"></div>
        <div class="scale-endpoints">
          <span id="post-left-3"></span>
          <span id="post-right-3"></span>
        </div>
      </div>

      <div class="post-task-question">
        <div id="frustrating-question" class="post-task-question-text"></div>
        <div id="post-frustrating-scale" class="likert-scale"></div>
        <div class="scale-endpoints">
          <span id="post-left-4"></span>
          <span id="post-right-4"></span>
        </div>
      </div>

      <div class="post-task-question">
        <div id="confidence-question" class="post-task-question-text"></div>
        <div id="post-confidence-scale" class="likert-scale"></div>
        <div class="scale-endpoints">
          <span id="post-left-5"></span>
          <span id="post-right-5"></span>
        </div>
      </div>

      <p id="post-task-reminder" class="post-task-reminder"></p>
      <p id="post-task-error" class="error"></p>

      <button
        id="post-task-button"
        type="button"
        class="main-button"
        onclick="savePostTaskRatings()"
      ></button>
    </div>
  </section>

  <section id="complete-screen" class="screen">
    <div class="card center">
      <h1 id="complete-title"></h1>
      <p id="complete-text"></p>

      <p id="upload-status" class="upload-status" aria-live="polite"></p>

      <div class="download-buttons">
        <button id="download-trials-button" type="button" onclick="downloadTrialCSV()"></button>
        <button id="download-items-button" type="button" onclick="downloadInterpretationCSV()"></button>
        <button id="download-json-button" type="button" onclick="downloadFullJSON()"></button>
      </div>
    </div>
  </section>

    async function savePostTaskRatings() {
      const selectedRatings = {};

      for (

        index < postTaskRatingDefinitions.length;
        index++

        const definition =
          postTaskRatingDefinitions[index];

        const selected = document.querySelector(
          `input[name="${definition.name}"]:checked`

    async function submitCompleteDataToSupabase() {
      if (!participant.participant_id) {
        console.error(
          "Cannot upload data without a participant ID."
        );
        return false;
      }

      let alreadyUploaded = false;

      try {
        alreadyUploaded =
          localStorage.getItem(
            `coffee_experiment_uploaded_${participant.participant_id}`
          ) === "true";
      } catch (error) {
        console.warn(
          "Upload status could not be checked locally:",
          error
        );
      }

      if (alreadyUploaded) {
        return true;
      }

      const payload = {
        participant_id:
          participant.participant_id,

        full_data:
          buildCompleteData()
      };

      try {
        const response = await fetch(
          SUPABASE_SUBMISSIONS_ENDPOINT,
          {
            method: "POST",

            headers: {
              "apikey":
                SUPABASE_PUBLISHABLE_KEY,

              "Content-Type":
                "application/json",

              "Prefer":
                "return=minimal"
            },

            body:
              JSON.stringify(payload)
          }
        );

        if (!response.ok) {
          const responseText =
            await response.text();

          console.error(
            "Supabase upload failed:",
            response.status,
            responseText
          );

          return false;
        }

        return true;

      } catch (error) {
        console.error(
          "Supabase upload error:",
          error
        );

        return false;
      }
    }

      const missingGivenCount =
        fortuneGiven === "yes" && !fortuneGivenCount;

      if (
        !ageValue ||
        !Number.isFinite(age) ||

    function generateParticipantId() {
      const randomPart = Math.random().toString(36).slice(2, 8).toUpperCase();
      const datePart = new Date()
        .toISOString()
        .replaceAll("-", "")
        .replaceAll(":", "")
        .replace("T", "_")
        .slice(0, 15);

      return `P_${datePart}_${randomPart}`;
    }

    function beginExperiment() {
      imageOrder = Array.from({ length: TOTAL_IMAGES }, function(_, index) {
        return `images/${index + 1}.png`;
      });

      imageOrder = shuffle(imageOrder);
      currentTrialIndex = 0;
      trialResults = [];
      experimentInProgress = true;

      saveLocalBackup();
      showScreen("trial-screen");
      startTrial();
    }

    function shuffle(array) {
      const copy = [...array];

      for (let i = copy.length - 1; i > 0; i--) {
        const randomIndex = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[randomIndex]] = [copy[randomIndex], copy[i]];
      }

      return copy;
    }

    function startTrial() {
      clearInterval(timerInterval);

      imageStartTime = null;
      trialStartedAtUTC = null;
      firstTypingTime = null;
      trialDeadline = null;
      trialSubmitted = false;
      typingEventLog = [];
      spaceKeyLog = [];
      interpretationStates = [];
      previousRawLines = [""];

      const image = document.getElementById("stimulus");
      const response = document.getElementById("response");

      response.value = "";
      response.disabled = true;
      updateResponseCounts();

      document.getElementById("trial-progress").textContent = t("trialProgress")
        .replace("{current}", currentTrialIndex + 1)
        .replace("{total}", imageOrder.length);

      document.getElementById("timer").textContent =
        t("timeRemaining").replace("{seconds}", 60);

      image.style.visibility = "hidden";

      image.onload = function() {
        image.style.visibility = "visible";
        response.disabled = false;

        imageStartTime = performance.now();
        trialDeadline = imageStartTime + TRIAL_DURATION_MS;
        trialStartedAtUTC = new Date().toISOString();

        response.focus();
        startTimer();
      };

      image.onerror = function() {
        clearInterval(timerInterval);
        response.disabled = true;
        alert(`Image could not be loaded: ${imageOrder[currentTrialIndex]}`);
      };

      image.src = imageOrder[currentTrialIndex];
    }

    function startTimer() {
      function tick() {
        if (trialSubmitted || trialDeadline === null) {
          return;
        }

        const remainingMs = Math.max(0, trialDeadline - performance.now());
        const remainingSeconds = Math.ceil(remainingMs / 1000);

        document.getElementById("timer").textContent =
          t("timeRemaining").replace("{seconds}", remainingSeconds);

        if (remainingMs <= 0) {
          finishTrialAutomatically();
        }
      }

      tick();
      timerInterval = setInterval(tick, 100);
    }

    document.getElementById("response").addEventListener("keydown", function(event) {
      if (
        event.key !== " " ||
        imageStartTime === null ||
        trialSubmitted
      ) {
        return;
      }

      const elapsedMs = Math.min(
        TRIAL_DURATION_MS,
        Math.max(
          0,
          Math.round(
            performance.now() - imageStartTime
          )
        )
      );

      spaceKeyLog.push({
        event_number: spaceKeyLog.length + 1,
        t_ms: elapsedMs,
        t_seconds: seconds(elapsedMs),
        cursor_start:
          this.selectionStart === null
            ? ""
            : this.selectionStart,
        cursor_end:
          this.selectionEnd === null
            ? ""
            : this.selectionEnd,
        full_text_before_space:
          this.value
      });
    });

    document.getElementById("response").addEventListener("input", function(event) {
      if (imageStartTime === null || trialSubmitted) {
        return;
      }

      const elapsedMs = Math.min(
        TRIAL_DURATION_MS,
        Math.max(0, Math.round(performance.now() - imageStartTime))
      );

      const text = this.value;

      if (firstTypingTime === null && text.trim().length > 0) {
        firstTypingTime = elapsedMs;
      }

      typingEventLog.push({
        event_number: typingEventLog.length + 1,
        t_ms: elapsedMs,
        t_seconds: seconds(elapsedMs),
        input_type: event.inputType || "",
        inserted_text: event.data === null ? "" : event.data,
        full_text: text
      });

      updateInterpretationStates(text, elapsedMs);
      updateResponseCounts();
    });

    function updateInterpretationStates(text, elapsedMs) {
      const rawLines = text.split(/\r?\n/);

      for (let index = 0; index < rawLines.length; index++) {
        const cleanedLine = rawLines[index].trim();

        if (!cleanedLine) {
          interpretationStates[index] = null;
          continue;
        }

        const existing = interpretationStates[index];

        if (!existing) {
          interpretationStates[index] = {
            raw_line_index: index,
            interpretation: cleanedLine,
            first_started_ms: elapsedMs,
            first_completed_ms: null,
            last_edited_ms: elapsedMs
          };
        } else if (existing.interpretation !== cleanedLine) {
          existing.interpretation = cleanedLine;
          existing.last_edited_ms = elapsedMs;
        }

        const state = interpretationStates[index];

        if (
          index < rawLines.length - 1 &&
          state.first_completed_ms === null
        ) {
          state.first_completed_ms = elapsedMs;
        }
      }

      if (interpretationStates.length > rawLines.length) {
        interpretationStates.length = rawLines.length;
      }

      previousRawLines = rawLines;
    }

    function createFinalInterpretations(finalText, totalTimeMs) {
      updateInterpretationStates(finalText, totalTimeMs);

      const lines = finalText.split(/\r?\n/);
      const finalInterpretations = [];
      let itemNumber = 0;

      lines.forEach(function(rawLine, rawIndex) {
        const cleanedLine = rawLine.trim();

        if (!cleanedLine) {
          return;
        }

        itemNumber++;

        const state = interpretationStates[rawIndex] || {
          interpretation: cleanedLine,
          first_started_ms: totalTimeMs,
          first_completed_ms: null,
          last_edited_ms: totalTimeMs
        };

        const wasCompletedWithEnter = state.first_completed_ms !== null;

        /*
          Enter'a basılmışsa yorumun tamamlanma zamanı Enter anıdır.
          Son satırda Enter yoksa tamamlanma zamanı son karakterin yazıldığı andır.
          Böylece 60 saniye zorunlu bekleme, son yorumu yanlışlıkla 60. saniyeye taşımaz.
        */
        const completedMs = wasCompletedWithEnter
          ? Math.max(state.first_completed_ms, state.last_edited_ms)
          : state.last_edited_ms;

        finalInterpretations.push({
          item_number: itemNumber,
          interpretation: cleanedLine,
          first_started_ms: state.first_started_ms,
          first_started_seconds: seconds(state.first_started_ms),
          first_completed_ms: completedMs,
          first_completed_seconds: seconds(completedMs),
          last_edited_ms: state.last_edited_ms,
          last_edited_seconds: seconds(state.last_edited_ms),
          finalized_ms: completedMs,
          finalized_seconds: seconds(completedMs),
          completion_method: wasCompletedWithEnter ? "enter" : "last_edit_at_timeout"
        });
      });

      return finalInterpretations;
    }

    function updateResponseCounts() {
      const response = document.getElementById("response");
      const text = response ? response.value || "" : "";

      const characterElement = document.getElementById("character-count");
      const wordElement = document.getElementById("word-count");

      if (characterElement) {
        characterElement.textContent =
          t("characters").replace("{count}", countCharacters(text));
      }

      if (wordElement) {
        wordElement.textContent =
          t("words").replace("{count}", countWords(text));
      }
    }

    function countCharacters(text) {
      return Array.from(text.trim()).length;
    }

    function countWords(text) {
      const cleanedText = text.trim();

      if (!cleanedText) {
        return 0;
      }

      try {
        const segmenter = new Intl.Segmenter(
          selectedLanguage,
          { granularity: "word" }
        );

        return Array.from(segmenter.segment(cleanedText))
          .filter(function(segment) {
            return segment.isWordLike;
          })
          .length;
      } catch (error) {
        return cleanedText.split(/\s+/).filter(Boolean).length;
      }
    }

    function finishTrialAutomatically() {
      if (trialSubmitted || imageStartTime === null) {
        return;
      }

      trialSubmitted = true;
      clearInterval(timerInterval);

      const responseElement = document.getElementById("response");
      const responseText = responseElement.value.trim();

      /*
        Zorunlu trial süresi tam 60 saniye olarak kaydedilir.
        Tarayıcı zamanlayıcısındaki birkaç ms gecikme ölçümü etkilemez.
      */
      const totalTimeMs = TRIAL_DURATION_MS;

      const finalInterpretations =
        createFinalInterpretations(responseText, totalTimeMs);

      responseElement.disabled = true;

      const imagePath = imageOrder[currentTrialIndex];
      const imageName = imagePath.split("/").pop();

      /*
        Main interpretation timing:
        use the moment when the interpretation was last edited,
        i.e. when its final written content was completed.

        finalized_ms / finalized_seconds are still retained
        separately in the detailed interpretation data.
      */
      const timingSummary = finalInterpretations
        .map(function(item) {
          return `${item.interpretation} @ ${item.last_edited_seconds}s`;
        })
        .join(" | ");

      pendingTrial = {
        trial_number: currentTrialIndex + 1,
        image: imageName,
        response: responseText,
        response_characters: countCharacters(responseText),
        response_words: countWords(responseText),
        interpretation_count: finalInterpretations.length,
        interpretation_timing_basis: "last_edited",
        interpretation_timing_summary: timingSummary,
        first_typing_ms: firstTypingTime === null ? "" : firstTypingTime,
        first_typing_seconds: firstTypingTime === null ? "" : seconds(firstTypingTime),
        total_time_ms: totalTimeMs,
        total_time_seconds: seconds(totalTimeMs),
        timed_out: true,
        forced_full_duration: true,
        trial_started_at_utc: trialStartedAtUTC,
        trial_ended_at_utc: new Date().toISOString(),

        /*
          Filled after the participant clicks
          "Next Image" on the inter-trial screen.
          The final image has no next-image wait,
          so these fields remain blank for that trial.
        */
        inter_trial_wait_ms: "",
        inter_trial_wait_seconds: "",

        interpretations: finalInterpretations,
        typing_event_log: typingEventLog,
        space_press_count: spaceKeyLog.length,
        space_key_log: spaceKeyLog
      };

      trialResults.push(pendingTrial);
      pendingTrial = null;
      currentTrialIndex++;

      saveLocalBackup();

      if (currentTrialIndex >= imageOrder.length) {
        initializePostTaskLikertScales();
        showScreen("post-task-screen");
        return;
      }

      /*
        Do NOT start the next image automatically.
        First show the ready screen.
      */
      interTrialStartTime = performance.now();
      showScreen("inter-trial-screen");
    }

    function downloadInterpretationCSV() {
      const columns = [
        "participant_id",

        "native_language",
        "fortune_familiarity",
        "fortune_received_before",

        "post_task_easy_patterns",
        "post_task_effortful",
        "post_task_frustrating",
        "post_task_confident",
        "trial_number",
        "image",
        "item_number",
        "interpretation",
        "first_started_ms",
        "first_started_seconds",
        "first_completed_ms",
        "first_completed_seconds",
        "last_edited_ms",
        "last_edited_seconds",
        "finalized_ms",

        "inter_trial_wait_seconds",
        "timed_out",
        "forced_full_duration"
      ];

      const rows = [];

      trialResults.forEach(function(trial) {
        if (trial.interpretations.length === 0) {
          const emptyRow = {
            ...participant,
            trial_number: trial.trial_number,
            image: trial.image,
            item_number: "",
            interpretation: "",
            first_started_ms: "",
            first_started_seconds: "",
            first_completed_ms: "",
            first_completed_seconds: "",
            last_edited_ms: "",
            last_edited_seconds: "",
            finalized_ms: "",
            finalized_seconds: "",
            completion_method: "",
            total_time_ms: trial.total_time_ms,
            inter_trial_wait_ms:
              trial.inter_trial_wait_ms,
            inter_trial_wait_seconds:
              trial.inter_trial_wait_seconds,
            timed_out: trial.timed_out,
            forced_full_duration:
              trial.forced_full_duration
          };

          rows.push(columns.map(function(column) {
            return escapeCSV(emptyRow[column]);
          }).join(","));

          return;
        }

        trial.interpretations.forEach(function(item) {
          const row = {
            ...participant,
            trial_number: trial.trial_number,
            image: trial.image,
            ...item,
            total_time_ms: trial.total_time_ms,
            inter_trial_wait_ms:
              trial.inter_trial_wait_ms,
            inter_trial_wait_seconds:
              trial.inter_trial_wait_seconds,
            timed_out: trial.timed_out,
            forced_full_duration:
              trial.forced_full_duration
          };

          rows.push(columns.map(function(column) {
            return escapeCSV(row[column]);
          }).join(","));
        });
      });

      const csv = columns.join(",") + "\n" + rows.join("\n");

      downloadTextFile(
        "\uFEFF" + csv,
        `${participant.participant_id}_interpretation_timings.csv`,
        "text/csv;charset=utf-8;"
      );
    }

    function downloadFullJSON() {
      const completeData =
        buildCompleteData();

      downloadTextFile(
        JSON.stringify(completeData, null, 2),
        `${participant.participant_id}_full_data.json`,
        "application/json;charset=utf-8;"
      );
    }

    function downloadTextFile(content, filename, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = filename;

      document.body.appendChild(link);
      link.click();
      link.remove();

      setTimeout(function() {
        URL.revokeObjectURL(url);
      }, 1000);
    }

    function escapeCSV(value) {
      if (value === undefined || value === null) {
        return '""';
      }

      return `"${String(value).replaceAll('"', '""')}"`;
    }

    function saveLocalBackup() {
      if (!participant.participant_id) {
        return;
      }

      const backup = {
        participant: participant,
        image_order: imageOrder,
        current_trial_index: currentTrialIndex,
        completed_trials: trialResults,
        pending_trial: pendingTrial,
        saved_at_utc: new Date().toISOString()
      };

      try {
        localStorage.setItem(
          `coffee_experiment_${participant.participant_id}`,
          JSON.stringify(backup)
        );
      } catch (error) {
        console.warn("Local backup could not be saved:", error);
      }
    }

    window.addEventListener("beforeunload", function(event) {
      if (!experimentInProgress) {
        return;
      }

      event.preventDefault();
      event.returnValue = "";
    });

    document.addEventListener("visibilitychange", function() {
      if (
        document.visibilityState === "visible" &&
        experimentInProgress &&
        !trialSubmitted &&
        trialDeadline !== null &&
        performance.now() >= trialDeadline
      ) {
        finishTrialAutomatically();
      }
    });
  </script>
</body>
</html>
